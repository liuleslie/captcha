<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CAPTCHA Archive</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f9fafb;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .header-title { font-size: 14px; font-weight: 700; color: #111; }
    .header-actions { display: flex; gap: 6px; }
    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 5px;
      border: 1px solid #d1d5db;
      background: #fff;
      cursor: pointer;
      color: #374151;
    }
    .btn-sm:hover { background: #f3f4f6; }
    .btn-sm.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-sm.primary:hover { background: #1d4ed8; }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .filter-bar input, .filter-bar select {
      flex: 1;
      padding: 5px 8px;
      font-size: 12px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      background: #fff;
      color: #374151;
      min-width: 0;
    }
    .filter-bar select { flex: 0 0 auto; }

    /* Stats bar */
    .stats-bar {
      padding: 6px 14px;
      font-size: 11px;
      color: #6b7280;
      background: #f9fafb;
      border-bottom: 1px solid #f3f4f6;
      flex-shrink: 0;
    }

    /* Session list */
    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
    }

    .session-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      padding: 10px 11px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.1s, box-shadow 0.1s;
    }
    .session-card:hover {
      border-color: #93c5fd;
      box-shadow: 0 1px 4px rgba(59,130,246,0.08);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }
    .card-hostname {
      font-size: 13px;
      font-weight: 600;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .card-time { font-size: 11px; color: #9ca3af; }
    .card-badges { display: flex; gap: 5px; margin-bottom: 7px; }
    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 9px;
      background: #f3f4f6;
      color: #374151;
    }
    .badge.provider { background: #eff6ff; color: #1d4ed8; }

    .card-thumbs {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .card-thumb {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 3px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
    }
    .card-thumb-placeholder {
      width: 44px;
      height: 44px;
      background: #f3f4f6;
      border-radius: 3px;
      border: 1px solid #e5e7eb;
    }
    .card-meta {
      font-size: 11px;
      color: #6b7280;
    }

    /* Load more */
    .load-more {
      text-align: center;
      padding: 10px;
    }

    /* Empty state */
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #9ca3af;
    }
    .empty-state h3 { font-size: 14px; margin-bottom: 6px; color: #6b7280; }
    .empty-state p { font-size: 12px; line-height: 1.5; }

    /* Detail overlay */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-overlay.hidden { display: none; }
    .detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #2563eb;
      padding: 2px 6px 2px 0;
      font-weight: 500;
    }
    .back-btn:hover { text-decoration: underline; }
    .detail-title { font-size: 14px; font-weight: 600; }
    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }
    .detail-section { margin-bottom: 18px; }
    .detail-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .detail-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 10px;
    }
    .detail-meta-row { font-size: 12px; color: #374151; }
    .detail-meta-row span { color: #9ca3af; }
    .detail-images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 6px;
    }
    .detail-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
      cursor: zoom-in;
    }
    .detail-footer {
      padding: 10px 14px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Selection checkboxes */
    .card-select {
      width: 14px;
      height: 14px;
      margin-right: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .card-header-left { display: flex; align-items: center; min-width: 0; }

    /* Notes */
    .notes-textarea {
      width: 100%; min-height: 72px;
      background: #f9fafb; color: #374151;
      border: 1px solid #d1d5db; border-radius: 4px;
      padding: 7px 9px; font-family: inherit; font-size: 12px;
      resize: vertical; line-height: 1.5;
    }
    .notes-textarea:focus { outline: none; border-color: #93c5fd; }
    .notes-save-btn {
      margin-top: 6px; padding: 4px 12px;
      font-size: 11px; font-weight: 500;
      border: 1px solid #d1d5db; border-radius: 4px;
      background: #fff; color: #374151; cursor: pointer;
    }
    .notes-save-btn:hover { background: #f3f4f6; }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.hidden { display: none; }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 4px;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-title">CAPTCHA Archive</span>
    <div class="header-actions">
      <button class="btn-sm" id="delete-selected-btn" style="display:none;color:#dc2626;border-color:#fca5a5">Delete selected</button>
      <button class="btn-sm" id="export-selected-btn" style="display:none">Export selected</button>
      <button class="btn-sm primary" id="export-all-btn">Export all</button>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" id="filter-hostname" placeholder="Filter by hostname…">
    <select id="filter-provider">
      <option value="">All types</option>
    </select>
  </div>

  <div class="stats-bar" id="stats-bar">Loading…</div>

  <div class="session-list" id="session-list">
    <div class="empty-state" id="empty-state" style="display:none">
      <h3>No sessions yet</h3>
      <p>Visit tabs with CAPTCHAs while the extension is active to start building your archive.</p>
    </div>
  </div>

  <div class="load-more" id="load-more" style="display:none">
    <button class="btn-sm" id="load-more-btn">Load more</button>
  </div>

  <!-- Detail overlay -->
  <div class="detail-overlay hidden" id="detail-overlay">
    <div class="detail-header">
      <button class="back-btn" id="back-btn">← Back</button>
      <span class="detail-title" id="detail-title"></span>
    </div>
    <div class="detail-body" id="detail-body"></div>
    <div class="detail-footer">
      <button class="btn-sm primary" id="detail-export-btn">Export session</button>
      <button class="btn-sm" id="detail-delete-btn" style="color:#dc2626; border-color:#fca5a5;">Delete</button>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox hidden" id="lightbox">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
