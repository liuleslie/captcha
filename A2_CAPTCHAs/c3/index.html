<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>smellPGH — report reader</title>
<style>
  /* ── theme variables ────────────────────────────────────────── */

  :root {
    --bg:                #000000;
    --fg:                #ffffff;
    --bar-bg:            #000000;
    --bar-border:        #000000;
    --h1-label:          #ffffff;
    --input-bg:          #000000;
    --input-border:      #303030;
    --input-focus:       gray;
    --btn-border:        gray;
    --status-color:      gray;
    --th-color:          #ffffff;
    --th-border:         #303030;
    --th-bg:             #000000;
    --tr-border:         #303030;
    --tr-hover:          #303030;
    --idx-color:         gray;
    --int-empty:         #505050;
    --meta-color:        gray;
    --dist-color:        #7fb3d3;
    --text-color:        #ffffff;
    --empty-color:       gray;
    --marker-color:      gray;
    --noresults-color:   #303030;
    --toggle-color:      gray;
  }

  body.light {
    --bg:                #f5f5f0;
    --fg:                #111111;
    --bar-bg:            #f5f5f0;
    --bar-border:        #ddd;
    --h1-label:          gray;
    --input-bg:          #f5f5f0;
    --input-border:      gray;
    --input-focus:       black;
    --btn-border:        #888;
    --status-color:      #888;
    --th-color:          black;
    --th-border:         #ddd;
    --th-bg:             #f5f5f0;
    --tr-border:         #eee;
    --tr-hover:          #eeede8;
    --idx-color:         gray;
    --int-empty:         #ddd;
    --meta-color:        gray;
    --dist-color:        #2980b9;
    --text-color:        #333;
    --empty-color:       gray;
    --marker-color:      gray;
    --noresults-color:   gray;
    --toggle-color:      gray;
  }

  /* ── base ───────────────────────────────────────────────────── */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    line-height: 1.6;
    padding: 0 0 4rem;
  }

  /* ── fixed top bar ─────────────────────────────────────────── */

  #top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: var(--bar-bg);
    z-index: 10;
    padding: 1.2rem 2rem 0.8rem;
    border-bottom: 1px solid var(--bar-border);
  }

  #top-bar-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }

  h1 {
    font-size: 1rem;
    font-weight: normal;
    color: var(--h1-label);
    letter-spacing: 0.05em;
  }

  h1 span { color: var(--fg); }

  #theme-toggle {
    background: none;
    border: none;
    color: var(--toggle-color);
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    padding: 0;
    letter-spacing: 0.05em;
  }

  #theme-toggle:hover { color: var(--fg); }

  #location-form {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.6rem;
  }

  #location-form input {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--fg);
    font-family: inherit;
    font-size: inherit;
    padding: 0.25rem 0.6rem;
    outline: none;
  }

  #location-form input:focus { border-color: var(--input-focus); }
  #zip-input { width: 6rem; }
  #streets-input { flex: 1; min-width: 12rem; }

  #location-form button {
    background: none;
    border: 1px solid var(--btn-border);
    color: var(--fg);
    font-family: inherit;
    font-size: inherit;
    padding: 0.25rem 0.8rem;
    cursor: pointer;
  }

  #location-form button:hover { border-color: var(--fg); }

  #status {
    color: var(--status-color);
    font-size: 0.82rem;
    margin-bottom: 0.5rem;
    min-height: 1.1em;
  }

  #status.error { color: #c0392b; }

  #search-input {
    display: block;
    width: 100%;
    margin-top: 0.4rem;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--fg);
    font-family: inherit;
    font-size: 0.82rem;
    padding: 0.25rem 0.6rem;
    outline: none;
  }
  #search-input:focus { border-color: var(--input-focus); }
  #search-input::placeholder { color: var(--status-color); }

  /* ── table ─────────────────────────────────────────────────── */

  #table-wrap {
    margin-top: var(--bar-height, 10rem);
    overflow-x: clip;
  }

  #report-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  #report-table col.col-idx   { width: 2.8rem; }
  #report-table col.col-int   { width: 4rem; }
  #report-table col.col-meta  { width: 9rem; }
  #report-table col.col-desc  { width: 22%; }
  #report-table col.col-sym   { width: 22%; }
  #report-table col.col-com   { width: 22%; }
  #report-table col.col-dist  { width: 5rem; }

  #report-table thead th {
    text-align: left;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--th-color);
    padding: 0.5rem 0.6rem;
    box-shadow: inset 0 -2px 0 var(--th-border);
    font-weight: normal;
    position: sticky;
    top: var(--bar-height, 0);
    background: var(--th-bg);
    transition: opacity 0.15s, color 0.15s;
    z-index: 12;
  }

  #report-table thead th[data-filter],
  #report-table thead th[data-sort]   { cursor: pointer; }
  #report-table thead th[data-filter]:hover,
  #report-table thead th[data-sort]:hover   { color: var(--fg); }

  th[data-sort="score"].sort-active::after { content: ' ↓'; font-size: 0.65rem; opacity: 0.7; }
  th[data-sort="dist"].sort-active::after  { content: ' ↑'; font-size: 0.65rem; opacity: 0.7; }

  #report-table tbody tr { border-bottom: 1px solid var(--tr-border); }
  #report-table tbody tr:hover { background: var(--tr-hover); }

  #report-table tbody td {
    padding: 0.5rem 0.6rem;
    vertical-align: top;
    transition: opacity 0.15s;
  }

  .cell-idx  { color: var(--idx-color); font-size: 0.8rem; }
  .cell-int  { letter-spacing: -1px; white-space: nowrap; }
  .cell-int .empty { color: var(--int-empty); }

  td[data-score="1"] .cell-int { color: #27ae60; }
  td[data-score="2"] .cell-int { color: #c8b800; }
  td[data-score="3"] .cell-int { color: #e67e22; }
  td[data-score="4"] .cell-int { color: #c0392b; }
  td[data-score="5"] .cell-int { color: #7b0000; }
  .cell-meta { color: var(--meta-color); font-size: 0.78rem; white-space: nowrap; }
  .cell-dist { color: var(--dist-color); font-size: 0.78rem; white-space: nowrap; }

  .cell-text {
    max-height: 6em;
    overflow-y: auto;
    color: var(--text-color);
    font-size: 0.88rem;
    scrollbar-width: thin;
    scrollbar-color: var(--input-border) transparent;
  }

  .cell-empty  { color: var(--empty-color); }
  .sent-marker { color: var(--marker-color); margin-left: 0.3rem; font-size: 0.7rem; }

  /* ── column dimming ─────────────────────────────────────────── */

  #report-table.dim-comments    td.col-com,
  #report-table.dim-comments    th.col-com  { opacity: 0.30; }
  #report-table.dim-description td.col-desc,
  #report-table.dim-description th.col-desc { opacity: 0.30; }
  #report-table.dim-symptoms    td.col-sym,
  #report-table.dim-symptoms    th.col-sym  { opacity: 0.30; }

  /* dist column hidden until toggled on; th stays visible as the toggle target */
  #report-table:not(.dist-visible) td.col-dist { display: none; }

  #no-results {
    color: var(--noresults-color);
    padding: 2rem;
    display: none;
  }
</style>
</head>
<body>

<div id="top-bar">
  <div id="top-bar-head">
    <h1>smellPGH — <span>report reader</span></h1>
    <button id="theme-toggle" title="toggle light/dark">light</button>
  </div>

  <form id="location-form" autocomplete="off">
    <input id="zip-input" type="text" placeholder="zip" maxlength="5" pattern="\d{5}">
    <input id="streets-input" type="text" placeholder="cross streets, e.g. Penn Ave, Negley Ave">
    <button type="submit">→</button>
  </form>

  <div id="status">fetching…</div>
  <input id="search-input" type="text" placeholder="search description / symptoms / comments…" autocomplete="off">

</div>

<div id="table-wrap">
  <table id="report-table">
    <colgroup>
      <col class="col-idx">
      <col class="col-int">
      <col class="col-meta">
      <col class="col-desc">
      <col class="col-sym">
      <col class="col-com">
      <col class="col-dist">
    </colgroup>
    <thead>
      <tr>
        <th>#</th>
        <th data-sort="score">score</th>
        <th>zip · time</th>
        <th class="col-desc" data-filter="description">description</th>
        <th class="col-sym"  data-filter="symptoms">symptoms</th>
        <th class="col-com"  data-filter="comments">comments</th>
        <th id="dist-header" class="col-dist" data-sort="dist" title="set location to sort by distance">dist</th>
      </tr>
    </thead>
    <tbody id="report-body"></tbody>
  </table>
  <div id="no-results">no reports with text found this week</div>
</div>

<script>
// ── constants ──────────────────────────────────────────────────────────────

const API_BASE = 'https://api.smellpittsburgh.org/api/v2';
const REGION_ID = 1; // Allegheny County

// visual marker only — not a hard filter
const SENTIMENT_RE = /\b(i|my|me|we|our|us|you|your|breath|breathing|breathe|lung|lungs|nose|throat|cough|coughing|wheeze|wheezing|asthma|chest|eyes?|skin|headache|nausea|nauseated|dizzy|dizziness|sick|burning|stinging|itchy|lightheaded|outside|inside|window|windows|door|doors|house|home)\b/i;

// ── state ──────────────────────────────────────────────────────────────────

let userLat = null;
let userLng = null;
let cachedReports = [];
let sortField = 'time'; // 'time' | 'score' | 'dist'
let distActive = false;
let searchTerm = '';

// ── bar height → CSS variable (drives sticky thead + table-wrap margin) ────

function updateBarHeight() {
  const h = document.getElementById('top-bar').offsetHeight;
  document.documentElement.style.setProperty('--bar-height', h + 'px');
}
window.addEventListener('resize', updateBarHeight);
updateBarHeight();

// ── theme toggle ───────────────────────────────────────────────────────────

const toggleBtn = document.getElementById('theme-toggle');
toggleBtn.addEventListener('click', () => {
  const isLight = document.body.classList.toggle('light');
  toggleBtn.textContent = isLight ? 'dark' : 'light';
});

// ── utils ──────────────────────────────────────────────────────────────────

function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2
    + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
    * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function weekStart() {
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  mon.setHours(0, 0, 0, 0);
  return Math.floor(mon.getTime() / 1000);
}

function textOf(r) {
  return [r.smell_description, r.feelings_symptoms, r.additional_comments]
    .filter(Boolean).join(' ');
}

function smellDots(v) {
  return '<span class="cell-int">'
    + '●'.repeat(v)
    + '<span class="empty">' + '○'.repeat(5 - v) + '</span>'
    + '</span>';
}

function fmtTime(unix) {
  return new Date(unix * 1000).toLocaleString('en-US', {
    month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit'
  });
}

// ── geocode ────────────────────────────────────────────────────────────────

async function geocode(zip, streets) {
  // Nominatim free-form q: commas improve parsing, pass user input as-is.
  // Structured params don't support intersections.
  const parts = [];
  if (streets) parts.push(streets.trim());
  parts.push('Pittsburgh, PA');
  if (zip) parts.push(zip);
  const q = parts.join(', ');
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=us`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`geocode error ${res.status}`);
  const data = await res.json();
  if (!data.length) throw new Error('location not found — include Ave / St (e.g. "Penn Ave, Negley Ave")');
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
}

// ── fetch reports ──────────────────────────────────────────────────────────

async function loadReports() {
  const start = weekStart();
  const url = `${API_BASE}/smell_reports?region_ids=${REGION_ID}&start_time=${start}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const all = await res.json();
  return all
    .filter(r => textOf(r).length > 0)
    .sort((a, b) => b.observed_at - a.observed_at);
}

// ── sort ───────────────────────────────────────────────────────────────────

function sortedReports() {
  const rs = [...cachedReports];
  if (sortField === 'score') {
    rs.sort((a, b) => b.smell_value - a.smell_value);
  } else if (sortField === 'dist' && userLat !== null) {
    rs.sort((a, b) =>
      haversine(userLat, userLng, a.latitude, a.longitude) -
      haversine(userLat, userLng, b.latitude, b.longitude)
    );
  } else {
    rs.sort((a, b) => b.observed_at - a.observed_at);
  }
  return rs;
}

function filteredReports() {
  const rs = sortedReports();
  if (!searchTerm) return rs;
  const term = searchTerm.toLowerCase();
  return rs.filter(r =>
    [r.smell_description, r.feelings_symptoms, r.additional_comments]
      .some(f => f && f.toLowerCase().includes(term))
  );
}

function applySort() {
  renderTable(filteredReports());
  const table = document.getElementById('report-table');
  table.classList.toggle('dist-visible', distActive);
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.classList.toggle('sort-active', th.dataset.sort === sortField);
  });
}

// ── render table ───────────────────────────────────────────────────────────

function renderTable(reports) {
  const tbody = document.getElementById('report-body');
  const noResults = document.getElementById('no-results');
  tbody.innerHTML = '';

  if (reports.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  reports.forEach((r, i) => {
    const hasSentiment = SENTIMENT_RE.test(textOf(r));
    const dist = userLat !== null
      ? haversine(userLat, userLng, r.latitude, r.longitude).toFixed(1) + ' mi'
      : '';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="cell-idx col-idx">${i + 1}${hasSentiment ? '<span class="sent-marker" title="personal language">·</span>' : ''}</td>
      <td class="col-int" data-score="${r.smell_value}">${smellDots(r.smell_value)}</td>
      <td class="cell-meta col-meta">${escHtml(r.zipcode || '—')}<br>${fmtTime(r.observed_at)}</td>
      <td class="col-desc">${r.smell_description  ? `<div class="cell-text">${escHtml(r.smell_description)}</div>`  : '<span class="cell-empty">—</span>'}</td>
      <td class="col-sym"> ${r.feelings_symptoms  ? `<div class="cell-text">${escHtml(r.feelings_symptoms)}</div>`  : '<span class="cell-empty">—</span>'}</td>
      <td class="col-com"> ${r.additional_comments ? `<div class="cell-text">${escHtml(r.additional_comments)}</div>` : '<span class="cell-empty">—</span>'}</td>
      <td class="cell-dist col-dist">${dist}</td>
    `;
    tbody.appendChild(tr);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── filter ─────────────────────────────────────────────────────────────────

function toggleColumnFocus(filter) {
  const table = document.getElementById('report-table');
  table.classList.toggle(`dim-${filter}`);
}

// ── init ───────────────────────────────────────────────────────────────────

function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

async function init() {
  setStatus('fetching this week\'s reports…');
  try {
    cachedReports = await loadReports();
    const count = cachedReports.length;
    setStatus(`${count} report${count !== 1 ? 's' : ''} this week`);
    applySort();
  } catch (e) {
    setStatus('could not load reports: ' + e.message, true);
  }
}

document.getElementById('location-form').addEventListener('submit', async e => {
  e.preventDefault();
  const zip = document.getElementById('zip-input').value.trim();
  const streets = document.getElementById('streets-input').value.trim();
  if (!zip) return;

  setStatus('locating…');
  try {
    const loc = await geocode(zip, streets);
    userLat = loc.lat;
    userLng = loc.lng;
    setStatus('fetching this week\'s reports…');
    cachedReports = await loadReports();
    const count = cachedReports.length;
    setStatus(`${count} report${count !== 1 ? 's' : ''} this week`);
    applySort();
  } catch (e) {
    setStatus(e.message, true);
  }
});

document.getElementById('report-table').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th) return;
  if (th.dataset.filter) {
    toggleColumnFocus(th.dataset.filter);
  } else if (th.dataset.sort === 'score') {
    sortField = sortField === 'score' ? 'time' : 'score';
    applySort();
  } else if (th.dataset.sort === 'dist') {
    if (userLat === null) { setStatus('set location first', true); return; }
    distActive = !distActive;
    sortField = distActive ? 'dist' : 'time';
    applySort();
  }
});

document.getElementById('search-input').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  applySort();
});

init();
</script>
</body>
</html>
